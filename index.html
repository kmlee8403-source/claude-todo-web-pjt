<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo List</title>
<style>
  :root {
    --bg: #f5f5f7;
    --card-bg: #ffffff;
    --text: #1d1d1f;
    --sub-text: #86868b;
    --accent: #0071e3;
    --border: #e5e5ea;
    --danger: #ff3b30;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    padding: 32px 16px;
    min-height: 100vh;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
  }

  .app {
    width: 100%;
    max-width: 480px;
  }

  .app-header {
    text-align: center;
    margin-bottom: 20px;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 0;
  }

  .today-date {
    margin: 4px 0 0;
    font-size: 13px;
    color: var(--sub-text);
  }

  .input-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  #todo-input {
    flex: 1 1 160px;
    min-width: 0;
    padding: 12px 14px;
    font-size: 15px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card-bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  #todo-input:focus {
    border-color: var(--accent);
  }

  #add-btn {
    padding: 12px 18px;
    font-size: 15px;
    font-weight: 500;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  #add-btn:hover {
    opacity: 0.85;
  }

  #add-btn:active {
    opacity: 0.7;
    transform: scale(0.97);
  }

  .todo-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .todo-item {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px 12px;
    padding: 12px 14px;
    background: var(--card-bg);
    border-radius: 10px;
    border: 1px solid var(--border);
    transition: background 0.15s, box-shadow 0.15s;
  }

  .todo-item:hover {
    box-shadow: 0 1px 6px rgba(0, 0, 0, 0.06);
  }

  .todo-text {
    flex: 1 1 120px;
    min-width: 0;
    font-size: 15px;
    word-break: break-word;
  }

  .todo-text.completed {
    text-decoration: line-through;
    color: var(--sub-text);
  }

  .todo-checkbox {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    cursor: pointer;
    accent-color: var(--accent);
    transition: transform 0.12s ease;
  }

  .todo-checkbox:active {
    transform: scale(0.85);
  }

  .todo-actions {
    display: flex;
    align-items: center;
    gap: 2px;
    margin-left: auto;
  }

  .todo-category {
    font-size: 12px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 999px;
    white-space: nowrap;
  }

  .cat-personal {
    background: rgba(0, 113, 227, 0.12);
    color: #0071e3;
  }

  .cat-study {
    background: rgba(52, 199, 89, 0.15);
    color: #248a3d;
  }

  .cat-work {
    background: rgba(255, 149, 0, 0.15);
    color: #c93400;
  }

  .cat-hobby {
    background: rgba(175, 82, 222, 0.12);
    color: #8944ab;
  }

  .category-select {
    padding: 12px 10px;
    font-size: 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card-bg);
    color: var(--text);
    cursor: pointer;
    outline: none;
    transition: border-color 0.15s;
  }

  .category-select:focus {
    border-color: var(--accent);
  }

  .filter-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    overflow-x: auto;
  }

  .filter-tab {
    padding: 6px 14px;
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--card-bg);
    color: var(--sub-text);
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s, transform 0.1s;
  }

  .filter-tab:hover {
    border-color: var(--accent);
  }

  .filter-tab:active {
    transform: scale(0.96);
  }

  .filter-tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .progress-section {
    margin-bottom: 20px;
  }

  .progress-text {
    font-size: 13px;
    color: var(--sub-text);
    margin-bottom: 6px;
  }

  .progress-bar-track {
    width: 100%;
    height: 8px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 999px;
    transition: width 0.2s ease;
  }

  .icon-btn {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border: none;
    background: transparent;
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    border-radius: 8px;
    transition: background 0.15s, transform 0.1s;
  }

  .icon-btn:active {
    transform: scale(0.9);
  }

  .icon-btn.muted {
    color: var(--sub-text);
  }

  .icon-btn.muted:hover {
    background: rgba(0, 0, 0, 0.06);
  }

  .icon-btn.danger {
    color: var(--danger);
    font-size: 18px;
  }

  .icon-btn.danger:hover {
    background: rgba(255, 59, 48, 0.1);
  }

  .edit-input {
    flex: 1 1 120px;
    min-width: 0;
    padding: 6px 8px;
    font-size: 15px;
    border: 1px solid var(--accent);
    border-radius: 8px;
    background: var(--card-bg);
    color: var(--text);
    outline: none;
  }

  .btn-text {
    border: none;
    background: transparent;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  .btn-text:active {
    transform: scale(0.95);
  }

  .btn-text.accent {
    color: var(--accent);
  }

  .btn-text.accent:hover {
    background: rgba(0, 113, 227, 0.1);
  }

  .btn-text.muted {
    color: var(--sub-text);
  }

  .btn-text.muted:hover {
    background: rgba(0, 0, 0, 0.06);
  }

  .empty-state {
    text-align: center;
    color: var(--sub-text);
    font-size: 14px;
    padding: 40px 0;
  }

  .hidden {
    display: none !important;
  }

  .auth-form {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 12px;
  }

  .auth-input {
    padding: 12px 14px;
    font-size: 15px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card-bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .auth-input:focus {
    border-color: var(--accent);
  }

  .auth-submit-btn {
    padding: 12px 18px;
    font-size: 15px;
    font-weight: 500;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  .auth-submit-btn:hover {
    opacity: 0.85;
  }

  .auth-submit-btn:active {
    opacity: 0.7;
    transform: scale(0.97);
  }

  .auth-error {
    min-height: 18px;
    margin: 0;
    font-size: 13px;
    color: var(--danger);
  }

  .auth-switch {
    text-align: center;
    font-size: 13px;
    color: var(--sub-text);
    margin: 6px 0 0;
  }

  .logout-row {
    text-align: center;
    margin-top: 6px;
  }

  @media (max-width: 380px) {
    body {
      padding: 20px 12px;
    }

    #todo-input {
      flex-basis: 100%;
    }

    .category-select {
      flex: 1;
    }

    #add-btn {
      flex: 1;
    }
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --card-bg: #1c1c1e;
      --text: #f5f5f7;
      --sub-text: #98989d;
      --border: #38383a;
    }

    .cat-personal {
      background: rgba(10, 132, 255, 0.2);
      color: #64b5ff;
    }

    .cat-study {
      background: rgba(48, 209, 88, 0.2);
      color: #6fe390;
    }

    .cat-work {
      background: rgba(255, 159, 10, 0.2);
      color: #ffb454;
    }

    .cat-hobby {
      background: rgba(191, 90, 242, 0.2);
      color: #d493f5;
    }
  }
</style>
</head>
<body>
  <div class="app" id="auth-view">
    <div class="app-header">
      <h1>할 일 목록</h1>
    </div>

    <form class="auth-form" id="login-form">
      <input type="text" id="login-username" class="auth-input" placeholder="아이디" autocomplete="username">
      <input type="password" id="login-password" class="auth-input" placeholder="비밀번호" autocomplete="current-password">
      <p class="auth-error" id="login-error"></p>
      <button type="submit" class="auth-submit-btn">로그인</button>
    </form>
    <p class="auth-switch" id="to-signup-row">
      계정이 없으신가요?
      <button type="button" class="btn-text accent" id="show-signup-btn">회원가입</button>
    </p>

    <form class="auth-form hidden" id="signup-form">
      <input type="text" id="signup-username" class="auth-input" placeholder="아이디" autocomplete="username">
      <input type="password" id="signup-password" class="auth-input" placeholder="비밀번호" autocomplete="new-password">
      <input type="password" id="signup-password-confirm" class="auth-input" placeholder="비밀번호 확인" autocomplete="new-password">
      <p class="auth-error" id="signup-error"></p>
      <button type="submit" class="auth-submit-btn">가입하기</button>
    </form>
    <p class="auth-switch hidden" id="to-login-row">
      이미 계정이 있으신가요?
      <button type="button" class="btn-text accent" id="show-login-btn">로그인</button>
    </p>
  </div>

  <div class="app hidden" id="todo-view">
    <div class="app-header">
      <h1>할 일 목록</h1>
      <p class="today-date" id="today-date"></p>
      <p class="logout-row">
        <button type="button" class="btn-text muted" id="logout-btn">로그아웃</button>
      </p>
    </div>
    <div class="filter-tabs" id="filter-tabs">
      <button class="filter-tab active" data-filter="전체">전체</button>
      <button class="filter-tab" data-filter="개인">개인</button>
      <button class="filter-tab" data-filter="공부">공부</button>
      <button class="filter-tab" data-filter="업무">업무</button>
      <button class="filter-tab" data-filter="취미">취미</button>
    </div>
    <div class="progress-section" id="progress-section">
      <div class="progress-text" id="progress-text"></div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-bar-fill"></div>
      </div>
    </div>
    <div class="input-row">
      <input type="text" id="todo-input" placeholder="할 일을 입력하세요" autocomplete="off">
      <select id="category-select" class="category-select">
        <option value="개인" selected>개인</option>
        <option value="공부">공부</option>
        <option value="업무">업무</option>
        <option value="취미">취미</option>
      </select>
      <button id="add-btn">추가</button>
    </div>
    <ul class="todo-list" id="todo-list"></ul>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // Supabase anon(publishable) key는 공개되어도 안전하도록 설계된 키입니다.
  // 실제 접근 제어는 DB의 Row Level Security 정책이 담당합니다.
  const SUPABASE_URL = 'https://khqxfcapjlzzepgecrks.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_c3nPAJzcSQUiviEWunrerg_dOZdlso-';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const TABLE_NAME = 'todo_tbl';

  // 로그인 세션 유지는 localStorage로 관리하되, 회원 정보(아이디/비밀번호)는
  // Supabase user_tbl에 저장하고 RPC 함수(signup_user/login_user)를 통해서만 접근합니다.
  // 비밀번호는 DB 안에서 bcrypt 해시로만 저장되며, 브라우저에는 절대 전달되지 않습니다.
  const SESSION_KEY = 'todo-app-current-user';
  const CATEGORIES = ['개인', '공부', '업무', '취미'];
  const CATEGORY_CLASS = {
    '개인': 'cat-personal',
    '공부': 'cat-study',
    '업무': 'cat-work',
    '취미': 'cat-hobby'
  };

  let todos = [];
  let editingId = null;
  let currentFilter = '전체';

  const inputEl = document.getElementById('todo-input');
  const addBtnEl = document.getElementById('add-btn');
  const todayDateEl = document.getElementById('today-date');
  const listEl = document.getElementById('todo-list');
  const categorySelectEl = document.getElementById('category-select');
  const filterTabsEl = document.getElementById('filter-tabs');
  const progressTextEl = document.getElementById('progress-text');
  const progressBarFillEl = document.getElementById('progress-bar-fill');

  const authViewEl = document.getElementById('auth-view');
  const todoViewEl = document.getElementById('todo-view');
  const loginFormEl = document.getElementById('login-form');
  const loginUsernameEl = document.getElementById('login-username');
  const loginPasswordEl = document.getElementById('login-password');
  const loginErrorEl = document.getElementById('login-error');
  const signupFormEl = document.getElementById('signup-form');
  const signupUsernameEl = document.getElementById('signup-username');
  const signupPasswordEl = document.getElementById('signup-password');
  const signupPasswordConfirmEl = document.getElementById('signup-password-confirm');
  const signupErrorEl = document.getElementById('signup-error');
  const toSignupRowEl = document.getElementById('to-signup-row');
  const toLoginRowEl = document.getElementById('to-login-row');
  const showSignupBtnEl = document.getElementById('show-signup-btn');
  const showLoginBtnEl = document.getElementById('show-login-btn');
  const logoutBtnEl = document.getElementById('logout-btn');

  function showSignupForm() {
    loginErrorEl.textContent = '';
    signupErrorEl.textContent = '';
    loginFormEl.classList.add('hidden');
    toSignupRowEl.classList.add('hidden');
    signupFormEl.classList.remove('hidden');
    toLoginRowEl.classList.remove('hidden');
  }

  function showLoginForm() {
    loginErrorEl.textContent = '';
    signupErrorEl.textContent = '';
    signupFormEl.classList.add('hidden');
    toLoginRowEl.classList.add('hidden');
    loginFormEl.classList.remove('hidden');
    toSignupRowEl.classList.remove('hidden');
  }

  function showAuthView() {
    todoViewEl.classList.add('hidden');
    authViewEl.classList.remove('hidden');
    loginFormEl.reset();
    signupFormEl.reset();
    showLoginForm();
  }

  function showTodoView() {
    authViewEl.classList.add('hidden');
    todoViewEl.classList.remove('hidden');
    init();
  }

  async function handleSignup(e) {
    e.preventDefault();

    const username = signupUsernameEl.value.trim();
    const password = signupPasswordEl.value;
    const passwordConfirm = signupPasswordConfirmEl.value;

    if (username === '' || password === '') {
      signupErrorEl.textContent = '아이디와 비밀번호를 모두 입력해주세요.';
      return;
    }

    if (password !== passwordConfirm) {
      signupErrorEl.textContent = '비밀번호가 일치하지 않습니다.';
      return;
    }

    signupErrorEl.style.color = 'var(--danger)';

    const { error } = await supabaseClient.rpc('signup_user', {
      p_username: username,
      p_password: password
    });

    if (error) {
      signupErrorEl.textContent = error.message;
      return;
    }

    signupFormEl.reset();
    showLoginForm();
    loginUsernameEl.value = username;
    loginErrorEl.textContent = '회원가입이 완료되었습니다. 로그인해주세요.';
    loginErrorEl.style.color = 'var(--accent)';
  }

  async function handleLogin(e) {
    e.preventDefault();

    const username = loginUsernameEl.value.trim();
    const password = loginPasswordEl.value;

    if (username === '' || password === '') {
      loginErrorEl.style.color = 'var(--danger)';
      loginErrorEl.textContent = '아이디와 비밀번호를 모두 입력해주세요.';
      return;
    }

    const { error } = await supabaseClient.rpc('login_user', {
      p_username: username,
      p_password: password
    });

    if (error) {
      loginErrorEl.style.color = 'var(--danger)';
      loginErrorEl.textContent = error.message;
      return;
    }

    localStorage.setItem(SESSION_KEY, username);
    loginFormEl.reset();
    showTodoView();
  }

  function handleLogout() {
    localStorage.removeItem(SESSION_KEY);
    showAuthView();
  }

  function mapRow(row) {
    return {
      id: row.id,
      text: row.text,
      category: row.category,
      completed: row.completed,
      createdAt: row.created_at
    };
  }

  async function loadTodos() {
    const { data, error } = await supabaseClient
      .from(TABLE_NAME)
      .select('*')
      .order('created_at', { ascending: true });

    if (error) {
      console.error('할 일 목록을 불러오는 중 오류가 발생했습니다:', error);
      alert('할 일 목록을 불러오지 못했습니다. 네트워크 상태를 확인해주세요.');
      return [];
    }

    return data.map(mapRow);
  }

  async function addTodo() {
    const text = inputEl.value.trim();
    if (text === '') {
      return;
    }

    const { data, error } = await supabaseClient
      .from(TABLE_NAME)
      .insert({ text: text, category: categorySelectEl.value })
      .select()
      .single();

    if (error) {
      console.error('할 일을 추가하는 중 오류가 발생했습니다:', error);
      alert('할 일을 추가하지 못했습니다.');
      return;
    }

    todos.push(mapRow(data));
    inputEl.value = '';
    render();
    inputEl.focus();
  }

  async function deleteTodo(id) {
    const { error } = await supabaseClient
      .from(TABLE_NAME)
      .delete()
      .eq('id', id);

    if (error) {
      console.error('할 일을 삭제하는 중 오류가 발생했습니다:', error);
      alert('할 일을 삭제하지 못했습니다.');
      return;
    }

    todos = todos.filter(todo => todo.id !== id);
    render();
  }

  async function toggleComplete(id) {
    const todo = todos.find(todo => todo.id === id);
    const nextCompleted = !todo.completed;

    const { error } = await supabaseClient
      .from(TABLE_NAME)
      .update({ completed: nextCompleted })
      .eq('id', id);

    if (error) {
      console.error('할 일 상태를 변경하는 중 오류가 발생했습니다:', error);
      alert('할 일 상태를 변경하지 못했습니다.');
      return;
    }

    todo.completed = nextCompleted;
    render();
  }

  function startEdit(id) {
    editingId = id;
    render();
  }

  function cancelEdit() {
    editingId = null;
    render();
  }

  async function saveEdit(id, newText, newCategory) {
    const text = newText.trim();
    if (text === '') {
      return;
    }

    const { error } = await supabaseClient
      .from(TABLE_NAME)
      .update({ text: text, category: newCategory })
      .eq('id', id);

    if (error) {
      console.error('할 일을 수정하는 중 오류가 발생했습니다:', error);
      alert('할 일을 수정하지 못했습니다.');
      return;
    }

    const todo = todos.find(todo => todo.id === id);
    todo.text = text;
    todo.category = newCategory;
    editingId = null;
    render();
  }

  function getFilteredTodos() {
    if (currentFilter === '전체') {
      return todos;
    }
    return todos.filter(todo => todo.category === currentFilter);
  }

  function getSortedForDisplay(list) {
    return [...list].sort((a, b) => Number(a.completed) - Number(b.completed));
  }

  function updateProgress(scopedTodos) {
    const total = scopedTodos.length;

    if (total === 0) {
      progressTextEl.textContent = '할 일이 없습니다';
      progressBarFillEl.style.width = '0%';
      return;
    }

    const completedCount = scopedTodos.filter(todo => todo.completed).length;
    const percent = Math.round((completedCount / total) * 100);
    progressTextEl.textContent = `${completedCount} / ${total} 완료 (${percent}%)`;
    progressBarFillEl.style.width = percent + '%';
  }

  function render() {
    listEl.innerHTML = '';

    const filteredTodos = getFilteredTodos();
    updateProgress(filteredTodos);

    if (filteredTodos.length === 0) {
      const empty = document.createElement('li');
      empty.className = 'empty-state';
      empty.textContent = todos.length === 0
        ? '할 일이 없습니다. 위에서 추가해보세요.'
        : '해당 카테고리에 할 일이 없습니다.';
      listEl.appendChild(empty);
      return;
    }

    getSortedForDisplay(filteredTodos).forEach(todo => {
      const li = document.createElement('li');
      li.className = 'todo-item';

      if (todo.id === editingId) {
        const editInput = document.createElement('input');
        editInput.type = 'text';
        editInput.className = 'edit-input';
        editInput.value = todo.text;

        const editCategorySelect = document.createElement('select');
        editCategorySelect.className = 'category-select';
        CATEGORIES.forEach(cat => {
          const option = document.createElement('option');
          option.value = cat;
          option.textContent = cat;
          if (cat === todo.category) {
            option.selected = true;
          }
          editCategorySelect.appendChild(option);
        });

        editInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            saveEdit(todo.id, editInput.value, editCategorySelect.value);
          } else if (e.key === 'Escape') {
            cancelEdit();
          }
        });

        editCategorySelect.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') {
            cancelEdit();
          }
        });

        const saveBtn = document.createElement('button');
        saveBtn.className = 'btn-text accent';
        saveBtn.textContent = '저장';
        saveBtn.addEventListener('click', () => saveEdit(todo.id, editInput.value, editCategorySelect.value));

        const cancelBtn = document.createElement('button');
        cancelBtn.className = 'btn-text muted';
        cancelBtn.textContent = '취소';
        cancelBtn.addEventListener('click', cancelEdit);

        const editActions = document.createElement('div');
        editActions.className = 'todo-actions';
        editActions.appendChild(saveBtn);
        editActions.appendChild(cancelBtn);

        li.appendChild(editInput);
        li.appendChild(editCategorySelect);
        li.appendChild(editActions);
        listEl.appendChild(li);

        editInput.focus();
        editInput.setSelectionRange(editInput.value.length, editInput.value.length);
        return;
      }

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.className = 'todo-checkbox';
      checkbox.checked = todo.completed;
      checkbox.addEventListener('change', () => toggleComplete(todo.id));

      const textSpan = document.createElement('span');
      textSpan.className = 'todo-text';
      if (todo.completed) {
        textSpan.classList.add('completed');
      }
      textSpan.textContent = todo.text;

      const categorySpan = document.createElement('span');
      categorySpan.className = 'todo-category ' + (CATEGORY_CLASS[todo.category] || 'cat-personal');
      categorySpan.textContent = todo.category;

      const editBtn = document.createElement('button');
      editBtn.className = 'icon-btn muted';
      editBtn.textContent = '✎';
      editBtn.title = '수정';
      editBtn.addEventListener('click', () => startEdit(todo.id));

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'icon-btn danger';
      deleteBtn.textContent = '✕';
      deleteBtn.title = '삭제';
      deleteBtn.addEventListener('click', () => deleteTodo(todo.id));

      const rowActions = document.createElement('div');
      rowActions.className = 'todo-actions';
      rowActions.appendChild(editBtn);
      rowActions.appendChild(deleteBtn);

      li.appendChild(checkbox);
      li.appendChild(textSpan);
      li.appendChild(categorySpan);
      li.appendChild(rowActions);
      listEl.appendChild(li);
    });
  }

  addBtnEl.addEventListener('click', addTodo);
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      addTodo();
    }
  });

  filterTabsEl.addEventListener('click', (e) => {
    const tabBtn = e.target.closest('.filter-tab');
    if (!tabBtn) {
      return;
    }
    currentFilter = tabBtn.dataset.filter;
    Array.from(filterTabsEl.children).forEach(child => child.classList.remove('active'));
    tabBtn.classList.add('active');
    render();
  });

  function renderTodayDate() {
    const today = new Date();
    const formatted = today.toLocaleDateString('ko-KR', {
      year: 'numeric',
      month: 'long',
      day: 'numeric',
      weekday: 'long'
    });
    todayDateEl.textContent = formatted;
  }

  async function init() {
    renderTodayDate();
    todos = await loadTodos();
    render();
  }

  loginFormEl.addEventListener('submit', handleLogin);
  signupFormEl.addEventListener('submit', handleSignup);
  showSignupBtnEl.addEventListener('click', showSignupForm);
  showLoginBtnEl.addEventListener('click', showLoginForm);
  logoutBtnEl.addEventListener('click', handleLogout);

  function checkSession() {
    const currentUser = localStorage.getItem(SESSION_KEY);
    if (currentUser) {
      showTodoView();
    } else {
      showAuthView();
    }
  }

  checkSession();
</script>
</body>
</html>
